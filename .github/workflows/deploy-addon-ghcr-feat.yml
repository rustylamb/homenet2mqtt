name: Deploy Addon to GHCR (feature branch)

# Builds the addon Docker image from the current branch and pushes to GHCR.
# Triggers on push to `feat/**` branches OR manual dispatch from any branch.
#
# Image tag format: <base-version>-feat.<short-sha>  (e.g. 2026.5.1-feat.f7576220)
# Also tagged: feat-<sanitized-branch>-latest  (e.g. feat-samsung-nasa-crc-latest)
#
# To use in HA: ensure the fork's addon config has
#   image: "ghcr.io/rustylamb/homenet2mqtt"
# Then update addon to the matching version (or directly pin tag in a test fork's config.yaml).

concurrency:
  group: deploy-addon-ghcr-feat-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'feat/**'
    paths:
      - 'packages/**'
      - 'hassio-addon/**'
      - '.github/workflows/deploy-addon-ghcr-feat.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version + tag
        id: version
        run: |
          BASE=$(grep '^version:' hassio-addon/config.yaml | awk '{print $2}' | tr -d '"' | tr -d '\r' | xargs)
          BRANCH_RAW="${{ github.ref_name }}"
          BRANCH_SLUG=$(echo "$BRANCH_RAW" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA:0:8}
          VERSION="${BASE}-feat.${SHORT_SHA}"
          BRANCH_TAG="${BRANCH_SLUG}-latest"

          echo "BASE=$BASE"
          echo "VERSION=$VERSION"
          echo "BRANCH_SLUG=$BRANCH_SLUG"
          echo "BRANCH_TAG=$BRANCH_TAG"

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BRANCH_SLUG=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "BRANCH_TAG=$BRANCH_TAG" >> $GITHUB_OUTPUT

          # Update addon config.yaml inline so HA shows this version on the addon page.
          sed -i "s/^version: .*/version: \"$VERSION\"/" hassio-addon/config.yaml
          # Sync to package.json (best-effort; tolerates schema differences)
          npm version "$VERSION" --no-git-tag-version --allow-same-version || true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Use PAT (GHCR_PAT secret with write:packages scope) because the
          # ghcr.io/rustylamb/homenet2mqtt package was pre-existing and the
          # default GITHUB_TOKEN lacks write access to it without explicit
          # "Manage Actions access" linkage on the package settings.
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (GHCR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: hassio-addon/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/rustylamb/homenet2mqtt:${{ steps.version.outputs.VERSION }}
            ghcr.io/rustylamb/homenet2mqtt:${{ steps.version.outputs.BRANCH_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump back to branch
        run: |
          if [[ -z $(git status -s hassio-addon/config.yaml package.json packages/*/package.json) ]]; then
            echo "no changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hassio-addon/config.yaml package.json packages/*/package.json 2>/dev/null || true
          git commit -m "chore(ci): bump addon version to ${{ steps.version.outputs.VERSION }}"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref }}

      - name: Summary
        run: |
          {
            echo "## Addon image pushed to GHCR"
            echo ""
            echo "| Tag | Pull command |"
            echo "|---|---|"
            echo "| \`${{ steps.version.outputs.VERSION }}\` | \`docker pull ghcr.io/rustylamb/homenet2mqtt:${{ steps.version.outputs.VERSION }}\` |"
            echo "| \`${{ steps.version.outputs.BRANCH_TAG }}\` | \`docker pull ghcr.io/rustylamb/homenet2mqtt:${{ steps.version.outputs.BRANCH_TAG }}\` |"
            echo ""
            echo "**HA deployment:** Refresh fork addon repo → addon page shows version \`${{ steps.version.outputs.VERSION }}\` → Update."
            echo ""
            echo "Note: \`:latest\` tag is NOT updated (main builds own its). Pin via the version-specific tag for traceability."
          } >> $GITHUB_STEP_SUMMARY
